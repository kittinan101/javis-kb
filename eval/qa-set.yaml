# Javis Q&A Eval Set (PLAN-002 T4.1)
# v2 (2026-07-19): 52 คู่ (positive 32 + negative 15 + multi-turn 5) — ครบเกณฑ์ gate Phase 1 (≥50, negative ≥15)
# ⏳ 22 เคสใหม่รอทีม review ความสมจริงก่อนรัน gate (M2.1) — แก้/ตัดได้เลยแล้วค่อยรัน
# gate Phase 1 วัดบนชุดครบ ≥ 50 เท่านั้น | negative ≥ 15 สำหรับวัด hallucination rate
# expect_answer_contains = smoke check เท่านั้น — คำตัดสินจริงใช้ LLM-judge + rubric (ดู PLAN-002 T4.2)

positive:
  - q: "Javis คืออะไร"
    expect_answer_contains: ["knowledge base", "ผู้ช่วย"]
    expect_cite: ["domains/javis/overview.md"]
    lang: th
  - q: "Javis มีฟีเจอร์อะไรบ้าง"
