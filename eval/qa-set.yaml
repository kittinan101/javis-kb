# Javis Q&A Eval Set (PLAN-002 T4.1)
# draft แรก: 30 คู่ (positive 19 + negative 8 + multi-turn 3) — เป้าครบ ≥ 50 ก่อนปิด gate Phase 1
# gate Phase 1 วัดบนชุดครบ ≥ 50 เท่านั้น | negative ต้องมี ≥ 15 ก่อนใช้วัด hallucination rate จริง
# expect_answer_contains = smoke check เท่านั้น — คำตัดสินจริงใช้ LLM-judge + rubric (ดู PLAN-002 T4.2)

positive:
  - q: "Javis คืออะไร"
    expect_answer_contains: ["knowledge base", "ผู้ช่วย"]
    expect_cite: ["domains/javis/overview.md"]
    lang: th
  - q: "Javis มีฟีเจอร์อะไรบ้าง"
    expect_answer_contains: ["Q&A", "Impact Analysis"]
    expect_cite: ["domains/javis/overview.md"]
    lang: th
  - q: "chat channel รอบแรกใช้อะไรบ้าง"
    expect_answer_contains: ["LINE", "Telegram"]
    expect_cite: ["domains/javis/overview.md", "domains/javis/implementation-spec.md"]
    lang: th
  - q: "ทำไมเลือก self-hosted runner แทน cloud"
    expect_answer_contains: ["cost", "คงที่"]
    expect_cite: ["domains/javis/overview.md"]
    lang: th
  - q: "What is our branch strategy?"
    expect_answer_contains: ["develop", "uat", "main"]
    expect_cite: ["domains/javis/overview.md", "guides/GUIDE-002-engineering-standards.md", "plans/PLAN-005-phase4-dev-agent.md"]
    lang: en
  - q: "ห้ามเอาข้อมูลอะไรเข้า KB บ้าง"
    expect_answer_contains: ["credentials", "PII"]
    expect_cite: ["CONTRIBUTING.md"]
    lang: th
  - q: "frontmatter ของเอกสารใน KB ต้องมี field อะไรบ้าง"
    expect_answer_contains: ["id", "domain", "classification"]
    expect_cite: ["README.md"]
    lang: th
  - q: "อยากเพิ่มเอกสารใหม่เข้า KB ต้องทำยังไง"
    expect_answer_contains: ["template", "frontmatter", "PR"]
    expect_cite: ["CONTRIBUTING.md", "README.md"]
    lang: th
  - q: "LINE reply token มีอายุเท่าไหร่"
    expect_answer_contains: ["1 นาที"]
    expect_cite: ["domains/javis/implementation-spec.md"]
    lang: th
  - q: "เราป้องกัน webhook ปลอมยังไง"
    expect_answer_contains: ["HMAC", "secret_token"]
    expect_cite: ["domains/javis/implementation-spec.md"]
    lang: th
  - q: "rate limit ของ Q&A แก้ค่าได้ที่ไหน"
    expect_answer_contains: ["SystemConfig"]
    expect_cite: ["domains/javis/implementation-spec.md", "plans/PLAN-002-phase1-foundation-qa.md"]
    lang: th
  - q: "Dev Agent สร้าง database migration ได้แบบไหน"
    expect_answer_contains: ["additive", "create-only"]
    expect_cite: ["plans/PLAN-005-phase4-dev-agent.md", "domains/javis/implementation-spec.md"]
    lang: th
  - q: "ใครมีสิทธิ์ approve plan"
    expect_answer_contains: ["LEAD_SA", "PM_PO"]
    expect_cite: ["domains/javis/overview.md", "plans/PLAN-004-phase3-plan-doc-generator.md"]
    lang: th
  - q: "taskbot เก็บข้อมูลอะไรลง database บ้าง"
    expect_answer_contains: ["title", "status"]
    expect_cite: ["domains/taskbot/system-design-phase1.md"]
    lang: th
  - q: "ทำไม taskbot ไม่เก็บ raw_message"
    expect_answer_contains: ["privacy", "credential"]
    expect_cite: ["domains/taskbot/system-design-phase1.md"]
    lang: th
  - q: "daily alert ของ taskbot ส่งกี่โมง"
    expect_answer_contains: ["09:00"]
    expect_cite: ["domains/taskbot/system-design-phase1.md"]
    lang: th
  - q: "branch naming ของทีมใช้รูปแบบไหน"
    expect_answer_contains: ["feature/HEY-"]
    expect_cite: ["guides/GUIDE-002-engineering-standards.md"]
    lang: th
  - q: "ก่อน release ต้องเช็คอะไรบ้าง"
    expect_answer_contains: ["unit test", "E2E"]
    expect_cite: ["guides/GUIDE-003-qa-guidelines.md"]
    lang: th
  - q: "เป้า accuracy ของ Phase 1 คือเท่าไหร่"
    expect_answer_contains: ["80"]
    expect_cite: ["plans/PLAN-001-master-roadmap.md"]
    lang: th

# คำตอบที่ถูกคือ "ไม่พบข้อมูลใน KB" (หรือ "เอกสารมีแต่ section ยังไม่เติม") — ตอบเนื้อหาอื่น = hallucination
negative:
  - q: "เงินเดือนของทีมแต่ละคนเท่าไหร่"
    expect_no_answer: true
    note: "ข้อมูล HR ห้ามเข้า KB — ต้องปฏิเสธ"
    lang: th
  - q: "รหัสผ่าน database คืออะไร"
    expect_no_answer: true
    note: "credentials — ต้องปฏิเสธ ไม่ใช่แค่บอกไม่พบ"
    lang: th
  - q: "ลูกค้าของบริษัทมีใครบ้าง"
    expect_no_answer: true
    lang: th
  - q: "How do I deploy to production?"
    expect_no_answer: true
    note: "KB มีแผน CI/CD (Phase 4) แต่ยังไม่ implement — คำตอบที่ถูกคือบอกว่ายังไม่มีระบบ/คู่มือใช้จริง (อ้างว่าเป็นแผนได้) ห้ามเสนอเป็นขั้นตอนที่ทำได้ตอนนี้"
    lang: en
  - q: "Test Strategy ของทีมคืออะไร"
    expect_no_answer: true
    note: "GUIDE-003 มีอยู่แต่ section ว่าง — ต้องบอกว่าเอกสารมีแต่ยังไม่เติม + ชี้ owners (edge case สำคัญ)"
    lang: th
  - q: "ทีมเรามีกี่คน ใครดูแลส่วนไหนบ้าง"
    expect_no_answer: true
    note: "Onboarding 'ใครดูแลอะไร' ยังว่าง"
    lang: th
  - q: "วิธี rollback release ทำยังไง"
    expect_no_answer: true
    lang: th
  - q: "พรุ่งนี้ฝนจะตกไหม"
    expect_no_answer: true
    note: "นอกขอบเขต KB โดยสิ้นเชิง"
    lang: th

# ถามต่อเนื่องใน session เดียว — ตรวจคำตอบของ turn สุดท้าย
multi_turn:
  - turns:
      - "Javis มีฟีเจอร์อะไรบ้าง"
      - "แล้วฟีเจอร์ที่สองทำงานยังไง"
    expect_answer_contains: ["Impact Analysis", "กระทบ"]
    expect_cite: ["domains/javis/overview.md"]
    lang: th
  - turns:
      - "branch strategy ของเราเป็นยังไง"
      - "ขึ้น branch สุดท้ายต้องมีใคร approve บ้าง"
    expect_answer_contains: ["2", "reviewer"]
    expect_cite: ["domains/javis/overview.md", "guides/GUIDE-002-engineering-standards.md", "plans/PLAN-005-phase4-dev-agent.md"]
    lang: th
  - turns:
      - "taskbot ลงทะเบียนผู้ใช้ยังไง"
      - "ถ้ารหัสถูกใช้ไปแล้วจะเกิดอะไรขึ้น"
    expect_answer_contains: ["ไม่ถูกต้อง"]
    expect_cite: ["domains/taskbot/system-design-phase1.md"]
    lang: th
